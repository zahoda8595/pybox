name: Build debug APK

# Compiles the Chaquopy/Kotlin/NDK app into an installable debug APK on
# GitHub's runners. This exists because compiling an Android app needs
# the Android SDK + NDK + a JDK - none of which are available in a
# sandboxed code-execution environment, so this workflow (not a local
# build) is the actual place the APK gets produced.
#
# Runs the backend pytest suite FIRST and fails the build if it's red -
# see tests.yml's own comment about wiring that dependency in; this
# workflow is that wiring.
#
# Trigger manually from the Actions tab (workflow_dispatch), or push to
# main. The finished APK is attached to the run as a downloadable
# artifact - look under the run's "Artifacts" section, not the Releases
# page (this doesn't create a release).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  backend-tests:
    name: pytest (backend_app.py)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: pip install -r tests/requirements-test.txt
      - name: Run backend test suite
        run: pytest tests/ -v

  build-apk:
    name: Assemble debug APK
    needs: backend-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + CMake (matches app/build.gradle's pinned versions)
        run: |
          sdkmanager --install "ndk;26.1.10909125" "cmake;3.22.1" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Python (for Chaquopy's own pip install step during the build)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"
        # This repo does not commit a gradlew wrapper (gradle/wrapper/*.jar
        # is a binary that has to be generated by running `gradle wrapper`
        # once with a real Gradle install - there's no source-only way to
        # produce it). setup-gradle installs Gradle 8.7 directly on the
        # runner instead, so `gradle assembleDebug` below works without one.
        # If you'd rather use ./gradlew locally in Android Studio, run
        # `gradle wrapper` once yourself and commit the result - then you
        # can simplify this step back to actions/setup-java + ./gradlew.

      - name: Assemble debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pybox-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
