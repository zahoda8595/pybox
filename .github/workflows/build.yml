name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android NDK
        run: |
          echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;26.3.11579264" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Checkout llama.cpp (built natively by app/src/main/cpp/CMakeLists.txt)
        run: |
          git clone --depth 1 https://github.com/ggml-org/llama.cpp app/src/main/cpp/llama.cpp
          echo "llama.cpp commit: $(git -C app/src/main/cpp/llama.cpp rev-parse HEAD)"

      - name: Check Python backend syntax
        run: |
          python3 -m py_compile app/src/main/python/backend_app.py app/src/main/python/error_manager.py
          echo "Backend syntax OK"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pybox-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
